<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal Employee Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e9ecef; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 320px; 
            text-align: center; 
        }
        .login-container h2 { 
            margin-top: 0;
            margin-bottom: 25px; 
            color: #343a40; 
            font-size: 24px;
        }
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ced4da; 
            border-radius: 4px; 
            box-sizing: border-box;
            font-size: 14px;
        }
        button { 
            background-color: #0d6efd; 
            color: white; 
            padding: 12px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 15px;
        }
        button:hover { 
            background-color: #0b5ed7; 
        }
        #message { 
            margin-top: 15px; 
            font-size: 14px; 
            font-weight: bold;
        }
        .logo {
            width: 60px;
            height: 60px;
            background-color: #0d6efd;
            color: white;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">IT</div>
        <h2>System Login</h2>
        
        <!-- VULNERABILITY 5: Developer comment leaking test credentials -->
        <!-- TODO: Remove dev account test/test1234 before deploying to production -->
        
        <form id="loginForm">
            <input type="text" id="username" placeholder="Employee Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Secure Login</button>
        </form>
        
        <p id="message"></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const msgElement = document.getElementById('message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                
                const data = await response.json();
                msgElement.innerText = data.message;
                msgElement.style.color = data.success ? "#198754" : "#dc3545";
                
                if (data.token) {
                    console.log("Session token acquired:", data.token);
                }
            } catch (err) {
                msgElement.innerText = "Connection error to authentication server.";
                msgElement.style.color = "#dc3545";
            }
        });
    </script>
</body>
</html>
